services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URI
        - PAYLOAD_SECRET
        - NEXT_PUBLIC_SERVER_URL
    restart: unless-stopped
    container_name: abect-app
    env_file:
      - ../.env.db
      - ../.env.frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3333:3000"
    volumes:
      - ./media:/app/media
    networks:
      - abect-shared
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  abect-shared:
    external: true
    name: abect-shared
